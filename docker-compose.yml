services:
  gateway:
    image: ${REGISTRY:-grabandgo}/gateway:${TAG:-latest}
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT}:8080"
    depends_on:
      - identity-api
      - catalog-api
      - order-api
      - media-api
      - analytics-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=gateway

  order-api:
    image: ${REGISTRY:-grabandgo}/order-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/services/Order/GrabAndGo.Order.API/Dockerfile
    depends_on:
      - postgres-order
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=order-api
      - ConnectionStrings__DefaultConnection=Host=postgres-order;Database=OrderDb;Username=postgres;Password=${POSTGRES_PASSWORD}

  catalog-api:
    image: ${REGISTRY:-grabandgo}/catalog-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/services/Catalog/GrabAndGo.Catalog.API/Dockerfile
    depends_on:
      - postgres-catalog
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=catalog-api
      - ConnectionStrings__DefaultConnection=Host=postgres-catalog;Database=CatalogDb;Username=postgres;Password=${POSTGRES_PASSWORD}

  media-api:
    image: ${REGISTRY:-grabandgo}/media-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/services/Media/GrabAndGo.Media.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=media-api

  analytics-api:
    image: ${REGISTRY:-grabandgo}/analytics-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/services/Analytics/GrabAndGo.Analytics.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=analytics-api

  identity-api:
    image: ${REGISTRY:-grabandgo}/identity-api:${TAG:-latest}
    build:
      context: .
      dockerfile: src/services/Identity/GrabAndGo.Identity.API/Dockerfile
    depends_on:
      - postgres-identity
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=identity-api
      - ConnectionStrings__DefaultConnection=Host=postgres-identity;Database=IdentityDb;Username=postgres;Password=${POSTGRES_PASSWORD}

  # Infrastructure
  postgres-identity:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data

  postgres-catalog:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data

  postgres-order:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_order_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # Observability
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus exporter metrics

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.enable-otlp-receiver
    volumes:
      - ./infra/observability/prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200" # http
      - "4317"      # otlp grpc

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./infra/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./infra/observability/grafana-dashboards-config.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./infra/observability/dashboards:/etc/grafana/provisioning/dashboards/files
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3000:3000"

volumes:
  postgres_identity_data:
  postgres_catalog_data:
  postgres_order_data:
  rabbitmq_data:
